ml:
  weights_source: our_real
  # ^^ shipping v6 trained checkpoint (val_iou=0.274, sarg_fp=0.034,
  # p@0.7=0.485 at best epoch). inference.py applies normalize_per_patch
  # under this mode to match train_.py input distribution. Falls back to
  # FDI heuristic via ai_detector when model returns zero detections.
  kagglehub_handle: manastiwari1410/drift-unetpp/pytorch/v1
  confidence_threshold: 0.5
  min_area_m2: 200.0
  patch_size: 256
  stride: 128
  in_channels: 14
  biofouling_tau_days: 30.0
  dummy_seed: 42

physics:
  windage_alpha: 0.02
  horizon_hours: 72
  dt_seconds: 3600
  particles_per_detection: 20
  cmems_path: data/env/cmems_currents_72h.nc
  era5_path: data/env/era5_winds_72h.nc

mission:
  top_k: 10
  weight_density: 0.5
  weight_accessibility: 0.3
  weight_convergence: 0.2
  avg_speed_kmh: 20.0
